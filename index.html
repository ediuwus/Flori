<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Flori la Super Preț 🌸</title>
    <style>
        body { font-family: 'Georgia', serif; background-color: #fff0f5; margin: 0; text-align: center; color: #d02090; }
        .shop-page { padding: 40px 20px; }
        .flower-card { background: white; border-radius: 15px; padding: 20px; box-shadow: 0 4px 10px rgba(0,0,0,0.1); display: inline-block; max-width: 300px; }
        .btn { background-color: #ff69b4; color: white; padding: 15px 30px; border: none; border-radius: 25px; font-size: 18px; cursor: pointer; margin-top: 20px; }
        
        /* Pagina de felicitare */
        #surprise { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff0f5; z-index: 999; padding-top: 50px; }
        .heart { color: #ff1493; font-size: 50px; animation: beat 1s infinite; }
        @keyframes beat { 0%, 100% { transform: scale(1); } 50% { transform: scale(1.2); } }
        .message { font-size: 24px; padding: 20px; line-height: 1.6; }
        .falling-flowers { position: absolute; top: -50px; animation: fall 5s linear infinite; font-size: 20px; }
        @keyframes fall { to { transform: translateY(110vh); } }
    </style>
</head>
<body>

    <div id="shop" class="shop-page">
        <h1 style="color: #ff1493;">🌸 Florăria "Pentru Tine" 🌸</h1>
        <p>Promoție Specială: Buchete de Lalele și Trandafiri de la 19.99 RON!</p>
        <div class="flower-card">
            <img src="https://cdn-icons-png.flaticon.com/512/346/346218.png" width="100">
            <h3>Buchet de Primăvară</h3>
            <p style="text-decoration: line-through; color: gray;">89 RON</p>
            <p style="font-size: 22px; font-weight: bold;">19.99 RON</p>
            <button class="btn" onclick="arataSurpriza()">VEZI OFERTA</button>
        </div>
    </div>

    <div id="surprise">
        <div class="heart">❤️</div>
