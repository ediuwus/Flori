<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Ofertă Specială Flori 🌸</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background-color: #fff5f8; margin: 0; text-align: center; overflow-x: hidden; }
        
        /* Pagina de Magazin */
        #shop { padding: 50px 20px; }
        .promo-card { background: white; border-radius: 20px; padding: 30px; box-shadow: 0 10px 20px rgba(0,0,0,0.05); display: inline-block; border: 2px solid #ffb6c1; }
        .btn-oferta { background: #ff4d94; color: white; padding: 15px 40px; border: none; border-radius: 50px; font-size: 20px; font-weight: bold; cursor: pointer; margin-top: 20px; transition: 0.3s; }
        .btn-oferta:hover { background: #ff1a75; transform: scale(1.05); }

        /* Ecranul cu Flori */
        #flower-garden { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle, #fff0f5, #ffb6c1); z-index: 100; overflow: hidden; }
        .instruction { position: absolute; top: 20px; width: 100%; font-size: 22px; color: #b03060; font-weight: bold; z-index: 101; text-shadow: 1px 1px white; }
        
        .floating-flower { 
            position: absolute; 
            font-size: 50px; 
            cursor: pointer; 
            user-select: none;
            transition: transform 0.2s;
            animation: move linear infinite;
        }
        
        @keyframes move {
            from { transform: translateY(110vh) rotate(0deg); }
            to { transform: translateY(-20vh) rotate(360deg); }
        }

        /* Mesajul care apare la click */
        .love-popup {
            position: fixed;
            background: rgba(255, 255, 255, 0.9);
            color: #d02090;
            padding: 10px 20px;
            border-radius: 20px;
            font-weight: bold;
            pointer-events: none;
            z-index: 1000;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
            animation: fadeOut 1.5s forwards;
        }
